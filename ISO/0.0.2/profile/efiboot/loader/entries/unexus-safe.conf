title   uNexus OS 0.0.2 Safe Graphics
linux   /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
initrd  /%INSTALL_DIR%/boot/intel-ucode.img
initrd  /%INSTALL_DIR%/boot/amd-ucode.img
initrd  /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
options archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% module_blacklist=nvidia,nvidia_drm,nvidia_modeset,nvidia_uvm nouveau.modeset=1 unexus.safe=1 loglevel=4
